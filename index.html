<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lukintosh Accounts</title>
<style>
body { background:#111; color:white; text-align:center; font-family:Arial; }
input,button { margin:10px; padding:10px; }
</style>
</head>

<body>

<h1>Lukintosh</h1>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Senha"><br>

<button onclick="signup()">Criar Conta</button>
<button onclick="login()">Login</button>

<script>

async function signup(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({email,password})
  });

  const data = await res.json();
  alert(data.message || data.error);
}

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({email,password})
  });

  const data = await res.json();

  if(data["2fa"]){
    const codigo = prompt("Digite o código do email:");

    const verify = await fetch("/verify-login", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({email,codigo})
    });

    const v = await verify.json();

    if(v.token){
      localStorage.setItem("token", v.token);
      alert("Login realizado 🚀");
    } else {
      alert(v.error);
    }
  } else {
    alert(data.error);
  }
}

</script>

</body>
</html>
